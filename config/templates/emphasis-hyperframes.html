<!doctype html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1280, height=720" />
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      margin: 0;
      width: 1280px;
      height: 720px;
      overflow: hidden;
    }
    .emphasis-highlight {
      opacity: 0;
      transform: scale(0.95);
      border: 2.5px solid rgba(255, 215, 0, 0.85);
      border-radius: 8px;
      background: rgba(255, 215, 0, 0.15);
      box-shadow:
        0 0 12px 4px rgba(255, 215, 0, 0.25),
        0 0 24px 8px rgba(255, 180, 0, 0.10);
    }
    .emphasis-glow {
      opacity: 0;
      transform: scale(0.95);
      border-radius: 14px;
      box-shadow:
        0 0 32px 14px rgba(255, 140, 0, 0.50),
        0 0 64px 28px rgba(255, 100, 0, 0.24),
        0 0 96px 40px rgba(255, 80, 0, 0.10),
        inset 0 0 18px 4px rgba(255, 140, 0, 0.06);
    }
    .dim-overlay {
      opacity: 0;
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0, 0, 0, 0.18);
      pointer-events: none;
    }
    .keyword-chip {
      opacity: 0;
      background: linear-gradient(180deg, rgba(0,0,0,0) 0%, rgba(0,0,0,0.85) 100%);
      display: flex;
      align-items: flex-end;
      justify-content: center;
      padding-bottom: 12px;
    }
    .keyword-chip span {
      color: #fff;
      font-size: 26px;
      font-weight: 600;
      letter-spacing: 0.05em;
      text-shadow: 0 1px 3px rgba(0,0,0,0.8);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
    }
  </style>
</head>
<body>
  <div id="root"
       data-composition-id="emphasis"
       data-start="0"
       data-duration="{{DURATION}}"
       data-width="1280"
       data-height="720"
       style="position: relative; width: 1280px; height: 720px;">

    <video class="clip" data-start="0" data-duration="{{DURATION}}" data-track-index="0"
           src="playback.mp4" muted playsinline
           style="position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover"></video>
    <audio data-start="0" data-duration="{{DURATION}}" data-track-index="10" data-volume="1"
           src="playback.mp4"></audio>

{{EMPHASIS_ELEMENTS}}

  </div>

  <script>
    window.__timelines = window.__timelines || {};
    var tl = gsap.timeline({ paused: true });
{{GSAP_ANIMATIONS}}
    window.__timelines["emphasis"] = tl;
  </script>
</body>
</html>
